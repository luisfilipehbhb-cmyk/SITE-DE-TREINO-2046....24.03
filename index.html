        let lastQuickInsert = null; // { pos, wasNewLine }

        notepad.addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 's') {
                e.preventDefault();
                saveNote();
            }

            // Backspace logo após toque rápido de 🖤 ou 🌍 — apaga só emoji+espaço, mantém a linha
            if (e.key === 'Backspace' && lastQuickInsert) {
                const pos = notepad.selectionStart;
                const text = notepad.value;

                for (const emoji of ['🖤', '🌍']) {
                    const withNewLine = '\n' + emoji + ' ';   // inserido em linha nova
                    const withoutNewLine = emoji + ' ';       // inserido em linha já vazia

                    if (lastQuickInsert.wasNewLine && text.substring(pos - withNewLine.length, pos) === withNewLine) {
                        e.preventDefault();
                        // Apaga só emoji + espaço (não o \n), cursor vai para início da linha
                        const emojiAndSpace = emoji + ' ';
                        const newPos = pos - emojiAndSpace.length;
                        notepad.value = text.substring(0, newPos) + text.substring(pos);
                        notepad.setSelectionRange(newPos, newPos);
                        lastQuickInsert = null;
                        return;
                    } else if (!lastQuickInsert.wasNewLine && text.substring(pos - withoutNewLine.length, pos) === withoutNewLine) {
                        e.preventDefault();
                        // Linha estava vazia: apaga emoji + espaço, cursor no início da linha
                        notepad.value = text.substring(0, pos - withoutNewLine.length) + text.substring(pos);
                        const newPos = pos - withoutNewLine.length;
                        notepad.setSelectionRange(newPos, newPos);
                        lastQuickInsert = null;
                        return;
                    }
                }

                // Se o usuário já digitou algo após o emoji, cancela o rastreamento
                lastQuickInsert = null;
            } else if (e.key !== 'Backspace') {
                // Qualquer outra tecla cancela o rastreamento
                lastQuickInsert = null;
            }
        });

        // Exportar backup em JSON
        async function exportBackup() {
            try {
                // Coletar dados do texto
                const text = notepad.value;
                
                // Coletar dados das imagens
                const images = [];
                const imageContainers = document.querySelectorAll('.image-container');
                
                imageContainers.forEach((container, index) => {
                    const img = container.querySelector('img');
                    if (img) {
                        images.push({
                            src: img.src,
                            width: container.getAttribute('data-width') || img.width,
                            x: container.getAttribute('data-x') || parseFloat(container.style.left) || 100,
                            y: container.getAttribute('data-y') || parseFloat(container.style.top) || 100,
                            index: index
                        });
                    }
                });
                
                // Criar objeto de backup
                const backup = {
                    version: '1.0',
                    date: new Date().toISOString(),
                    text: text,
                    images: images
                };
                
                // Converter para JSON
                const jsonString = JSON.stringify(backup, null, 2);
                
                // Criar blob
                const blob = new Blob([jsonString], { type: 'application/json' });
                
                // Criar nome do arquivo com data
                const now = new Date();
                const day = String(now.getDate()).padStart(2, '0');
                const month = String(now.getMonth() + 1).padStart(2, '0');
                const year = now.getFullYear();
                const filename = `BACKUP_NOTAS_FACULDADE_${day}-${month}-${year}.json`;
                
                // Tentar usar a File System Access API (Chrome Android 108+)
                if ('showSaveFilePicker' in window) {
                    try {
                        const options = {
                            suggestedName: filename,
                            types: [{
                                description: 'JSON Files',
                                accept: { 'application/json': ['.json'] }
                            }]
                        };
                        
                        const handle = await window.showSaveFilePicker(options);
                        const writable = await handle.createWritable();
                        await writable.write(blob);
                        await writable.close();
                        
                        showStatus(`Backup exportado! 📦 (${images.length} imagens)`);
                        return;
                    } catch (err) {
                        // Usuário cancelou ou erro - vamos usar fallback
                        if (err.name !== 'AbortError') {
                            console.log('Erro ao usar showSaveFilePicker:', err);
                        } else {
                            return; // Usuário cancelou
                        }
                    }
                }
                
                // Fallback para navegadores que não suportam ou se usuário cancelou
                // Tenta usar Web Share API (disponível no Android)
                if (navigator.share && navigator.canShare && navigator.canShare({ files: [new File([blob], 'test.json')] })) {
                    try {
                        const file = new File([blob], filename, { type: 'application/json' });
                        
                        await navigator.share({
                            files: [file],
                            title: 'Exportar Backup',
                            text: 'Arquivo de backup das notas da faculdade'
                        });
                        
                        showStatus(`Arquivo compartilhado! 📦 (${images.length} imagens)`);
                        return;
                    } catch (err) {
                        if (err.name !== 'AbortError') {
                            console.log('Erro ao compartilhar:', err);
                        } else {
                            return; // Usuário cancelou
                        }
                    }
                }
                
                // Fallback final: download tradicional
                const url = URL.createObjectURL(blob);
                
                // Criar link temporário para download
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                
                showStatus(`Backup exportado! 📦 (${images.length} imagens)`);
            } catch (err) {
                console.error('Erro ao exportar backup:', err);
                showStatus('Erro ao exportar backup ❌');
            }
        }

        // Função para comprimir imagem para menos de 450KB
        async function compressImage(imageSrc, maxSizeKB = 450) {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    
                    // Calcular redimensionamento inicial
                    let width = img.width;
                    let height = img.height;
                    
                    // Se a imagem for muito grande, reduzir dimensões primeiro
                    const maxDimension = 1200;
                    if (width > maxDimension || height > maxDimension) {
                        const ratio = Math.min(maxDimension / width, maxDimension / height);
                        width = Math.floor(width * ratio);
                        height = Math.floor(height * ratio);
                    }
                    
                    canvas.width = width;
                    canvas.height = height;
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    // Tentar com qualidade 0.6
                    let result = canvas.toDataURL('image/jpeg', 0.6);
                    let sizeKB = (result.length * 3) / 4 / 1024;
                    
                    // Se ainda estiver grande, reduzir mais
                    if (sizeKB > maxSizeKB) {
                        result = canvas.toDataURL('image/jpeg', 0.4);
                        sizeKB = (result.length * 3) / 4 / 1024;
                    }
                    
                    // Se AINDA estiver grande, reduzir dimensões
                    if (sizeKB > maxSizeKB) {
                        width = Math.floor(width * 0.6);
                        height = Math.floor(height * 0.6);
                        canvas.width = width;
                        canvas.height = height;
                        ctx.drawImage(img, 0, 0, width, height);
                        result = canvas.toDataURL('image/jpeg', 0.5);
                    }
                    
                    resolve(result);
                };
                
                img.onerror = function() {
                    resolve(imageSrc);
                };
                
                img.src = imageSrc;
            });
        }

        // Função para comprimir imagem para EXIBIÇÃO (1MB - mais rápido e melhor qualidade visual)
        async function compressImageForDisplay(imageSrc, maxSizeKB = 1024) {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    
                    // Calcular redimensionamento inicial baseado no tamanho da imagem
                    let width = img.width;
                    let height = img.height;
                    
                    // Se a imagem for muito grande, reduzir dimensões primeiro (otimização)
                    const maxDimension = 1500; // Máximo 1500px
                    if (width > maxDimension || height > maxDimension) {
                        const ratio = Math.min(maxDimension / width, maxDimension / height);
                        width = Math.floor(width * ratio);
                        height = Math.floor(height * ratio);
                    }
                    
                    canvas.width = width;
                    canvas.height = height;
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    // Tentar com qualidade 0.7 primeiro (boa qualidade, bom tamanho)
                    let result = canvas.toDataURL('image/jpeg', 0.7);
                    let sizeKB = (result.length * 3) / 4 / 1024;
                    
                    // Se ainda estiver muito grande, tentar qualidade 0.5
                    if (sizeKB > maxSizeKB) {
                        result = canvas.toDataURL('image/jpeg', 0.5);
                        sizeKB = (result.length * 3) / 4 / 1024;
                    }
                    
                    // Se AINDA estiver grande, reduzir dimensões mais
                    if (sizeKB > maxSizeKB) {
                        width = Math.floor(width * 0.7);
                        height = Math.floor(height * 0.7);
                        canvas.width = width;
                        canvas.height = height;
                        ctx.drawImage(img, 0, 0, width, height);
                        result = canvas.toDataURL('image/jpeg', 0.6);
                    }
                    
                    resolve(result);
                };
                
                img.onerror = function() {
                    resolve(imageSrc); // Retornar original se houver erro
                };
                
                img.src = imageSrc;
            });
        }

                    if (!backup.version || backup.text === undefined) {
                        throw new Error('Formato de backup inválido');
                    }
                    
                    // Confirmar importação
                    if (!confirm(`Importar backup de ${new Date(backup.date).toLocaleString()}?\n\nIsso substituirá todas as anotações atuais.`)) {
                        importInput.value = '';
                        return;
                    }
                    
                    showStatus('Importando backup... ⏳');
                    
                    // Limpar dados atuais
                    document.querySelectorAll('.image-container').forEach(c => c.remove());
                    currentActiveImage = null;
                    
                    // Restaurar texto
                    notepad.value = backup.text;
                    localStorage.setItem('myNote', backup.text);
                    
                    // Restaurar imagens usando createDraggableImage
                    if (backup.images && backup.images.length > 0) {
                        for (const imgData of backup.images) {
                            const x = parseFloat(imgData.x) || parseFloat(imgData.left) || 100;
                            const y = parseFloat(imgData.y) || parseFloat(imgData.top) || 100;
                            const width = parseFloat(imgData.width) || 175;
                            
                            await createDraggableImage(imgData.src, x, y, width);
                        }
                        
                        showStatus(`Backup importado! ✓ (${backup.images.length} imagens)`);
                    } else {
                        showStatus('Backup importado! ✓');
                    }
                    
                    autoResizeTextarea();
                    updateWrapperHeight();
                    
                } catch (err) {
                    console.error('Erro ao importar backup:', err);
                    alert('Erro ao importar backup!\n\nVerifique se o arquivo é um backup válido.');
                    showStatus('Erro ao importar backup ❌');
                }
                
                // Limpar input
                importInput.value = '';
            };
            
            reader.onerror = function() {
                showStatus('Erro ao ler arquivo ❌');
                importInput.value = '';
            };
            
            reader.readAsText(file);
        });
        // Registrar Service Worker (PWA - evita recarregamento)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./service-worker.js')
                .then(function(reg) { console.log('SW registrado:', reg.scope); })
                .catch(function(err) { console.error('SW erro:', err); });
        }
    </script>
</body>
</html>
